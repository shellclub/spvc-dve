# รันแอป + MySQL ในชุดเดียวกัน (ไม่ต้องพึ่ง DB เก่าบนเซิร์ฟเวอร์)
# ใช้: docker-compose up -d

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-spvc_root_2026}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-spvc_dve}
      MYSQL_USER: ${MYSQL_USER:-spvc}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-spvc_2026}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:-spvc_root_2026} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: "mysql://${MYSQL_USER:-spvc}:${MYSQL_PASSWORD:-spvc_2026}@mysql:3306/${MYSQL_DATABASE:-spvc_dve}"
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"

volumes:
  mysql_data:
