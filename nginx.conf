server {
    listen 80;
    server_name localhost;
    # 1. ถ้า URL ขึ้นต้นด้วย /uploads/ ให้ไปอ่านไฟล์จากโฟลเดอร์โดยตรง
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        autoindex off;
        expires 30d; # cache รูปไว้ที่เครื่อง user 30 วัน
    }
    location /report/ {
        alias /usr/share/nginx/html/report/;
        autoindex off;
        expires 30d; # cache รูปไว้ที่เครื่อง user 30 วัน
    }

    # 2. ถ้าเป็น URL อื่นๆ ให้ส่งไปหา Next.js
    location / {
        proxy_pass http://spvc:3000; # 'nextjs_app' ต้องตรงกับชื่อ service ใน docker-compose
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}