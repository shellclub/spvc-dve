# Auto Deploy ไปเซิร์ฟเวอร์เมื่อ push ขึ้น main
# ต้องตั้งค่า GitHub Secrets ก่อนใช้ (ดู DEPLOY.md)

name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:  # ให้กด deploy เองได้จาก Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/var/www/spvc-dve' }}"
            echo "→ cd $DEPLOY_PATH"
            cd "$DEPLOY_PATH" || { echo "ERROR: ไม่มีโฟลเดอร์ $DEPLOY_PATH บนเซิร์ฟเวอร์ (ต้องสร้างและ clone repo เองก่อน)"; exit 1; }
            echo "→ git pull"
            git fetch origin main
            git reset --hard origin/main
            echo "→ docker compose"
            COMPOSE_CMD="docker compose"
            if ! $COMPOSE_CMD version 2>/dev/null; then COMPOSE_CMD="docker-compose"; fi
            $COMPOSE_CMD down --remove-orphans 2>/dev/null || true
            $COMPOSE_CMD build --no-cache
            $COMPOSE_CMD up -d
            docker image prune -f
            echo "Deploy done. App + MySQL (port 3000, 3306)."
